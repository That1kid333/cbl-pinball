<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CBL Pinball - City Bucket List</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#0a0a1a;font-family:'Segoe UI',sans-serif;touch-action:none;display:flex;flex-direction:column;align-items:center;height:100dvh;color:#fff;-webkit-user-select:none;user-select:none}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:6px 12px;z-index:10;background:linear-gradient(180deg,rgba(26,26,46,.95),transparent);pointer-events:none}
#hud .logo{font-size:16px;font-weight:900;color:#FF6B35;text-shadow:0 0 10px #FF6B35}
#hud .score{font-size:20px;font-weight:700;color:#fff;text-shadow:0 0 8px #FF6B35}
#hud .balls{font-size:14px;color:#aaa}
#hud .combo{font-size:11px;color:#44ddff;opacity:0;transition:opacity .3s}
#hud .combo.active{opacity:1}
#hud .multiplier{font-size:13px;font-weight:700;color:#FFD700;text-shadow:0 0 6px #FFD700}
#bucketList{position:absolute;top:42px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;pointer-events:none}
.bl-item{width:24px;height:24px;border-radius:50%;border:2px solid #555;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;opacity:.4;transition:all .3s}
.bl-item.hit{opacity:1;border-color:#FF6B35;box-shadow:0 0 10px #FF6B35}
#statusBar{position:absolute;top:68px;left:50%;transform:translateX(-50%);font-size:11px;color:#44ddff;z-index:10;pointer-events:none;text-align:center;opacity:0;transition:opacity .5s}
#statusBar.show{opacity:1}
#controls{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0;z-index:10;height:auto;pointer-events:none}
.ctrl-btn{pointer-events:auto;border:2px solid #FF6B35;background:rgba(255,107,53,.15);color:#FF6B35;font-weight:700;border-radius:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
.ctrl-btn:active{background:rgba(255,107,53,.4)}
.ctrl-btn.flip-btn{width:30vw;max-width:120px;height:22vw;max-height:80px;font-size:16px;margin:0 6px 12px}
.ctrl-btn.launch-btn{width:22vw;max-width:90px;height:22vw;max-height:80px;font-size:13px;margin:0 auto 12px;border-radius:50%;position:relative}
#powerMeter{position:absolute;bottom:0;left:0;right:0;height:0%;background:linear-gradient(to top,#FF6B35,#FFD700);border-radius:0 0 50% 50%;opacity:0.5;transition:none;pointer-events:none}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,.92);z-index:20}
#overlay h1{font-size:36px;color:#FF6B35;margin-bottom:8px;text-shadow:0 0 20px #FF6B35}
#overlay h2{font-size:20px;color:#fff;margin-bottom:4px}
#overlay .final{font-size:48px;color:#FF6B35;font-weight:900;margin:12px 0}
#overlay button{padding:14px 40px;font-size:18px;background:#FF6B35;color:#1A1A2E;border:none;border-radius:8px;cursor:pointer;font-weight:700;margin-top:16px}
#overlay button:hover{background:#ff8555}
#overlay .sub{color:#aaa;font-size:14px;margin-top:8px}
#overlay .hi{color:#FFD700;font-size:16px;margin-top:12px}
canvas{display:block}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
</style>
</head>
<body>
<div id="hud">
  <div>
    <div class="logo">CBL PINBALL</div>
    <div class="multiplier" id="multDisplay"></div>
  </div>
  <div style="text-align:center">
    <div class="score" id="scoreDisplay">0</div>
    <div class="combo" id="comboDisplay">COMBO x1</div>
  </div>
  <div class="balls" id="ballsDisplay">&#9898;&#9898;&#9898;</div>
</div>
<div id="bucketList">
  <div class="bl-item" id="bl-buckee" style="color:gold">B</div>
  <div class="bl-item" id="bl-listy" style="color:#4f4">L</div>
  <div class="bl-item" id="bl-citty" style="color:#88f">C</div>
</div>
<div id="statusBar"></div>
<canvas id="game"></canvas>
<div id="controls">
  <button class="ctrl-btn flip-btn" id="btnLeft">&#9664; FLIP</button>
  <button class="ctrl-btn launch-btn" id="btnPlunger"><div id="powerMeter"></div>&#9660; LAUNCH</button>
  <button class="ctrl-btn flip-btn" id="btnRight">FLIP &#9654;</button>
</div>
<div id="overlay">
  <h1>CBL PINBALL</h1>
  <h2>City Bucket List</h2>
  <div class="sub">Hit Buckee, Listy &amp; Citty for MULTIBALL!</div>
  <div class="sub">&#128161; Skill Shot: Release plunger in the green zone!</div>
  <button id="startBtn">PLAY</button>
  <div class="hi" id="hiScoreDisplay"></div>
</div>
<script>
const C=document.getElementById('game'),ctx=C.getContext('2d');
const overlay=document.getElementById('overlay'),startBtn=document.getElementById('startBtn');
const scoreEl=document.getElementById('scoreDisplay'),ballsEl=document.getElementById('ballsDisplay');
const comboEl=document.getElementById('comboDisplay'),multEl=document.getElementById('multDisplay');
const statusBar=document.getElementById('statusBar'),hiScoreEl=document.getElementById('hiScoreDisplay');

// High scores
let hiScore=parseInt(localStorage.getItem('cbl_pinball_hi'))||0;
if(hiScore>0)hiScoreEl.textContent='\u{1F3C6} HIGH SCORE: '+hiScore.toLocaleString();

// Audio context
const AC=new(window.AudioContext||window.webkitAudioContext)();
function playSound(freq,dur,type='sine',vol=.12){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur);
}
function playChord(freqs,dur,type='sine',vol=.08){freqs.forEach(f=>playSound(f,dur,type,vol))}
function bumpSound(){playSound(600,.08,'square',.1);playSound(900,.12,'sine',.08)}
function flipSound(){playSound(200,.05,'square',.08)}
function drainSound(){playSound(150,.4,'sawtooth',.12);setTimeout(()=>playSound(100,.3,'sawtooth',.1),200)}
function bonusSound(){[0,80,160,240,320].forEach((d,i)=>setTimeout(()=>playSound(800+i*150,.15,'sine',.1),d))}
function launchSound(){playSound(80,.3,'sawtooth',.08);playSound(120,.2,'square',.06)}
function multiballSound(){[0,100,200,300,400,500].forEach((d,i)=>setTimeout(()=>playChord([600+i*100,800+i*100],.2,'sine',.08),d))}
function skillShotSound(){playChord([523,659,784],.3,'sine',.1);setTimeout(()=>playChord([784,988,1175],.4,'sine',.1),200)}
function extraBallSound(){[0,150,300].forEach((d,i)=>setTimeout(()=>playSound(440+i*220,.2,'triangle',.1),d))}
function spinnerSound(){playSound(1200,.03,'sine',.05)}
function kickbackSound(){playSound(300,.15,'square',.1);playSound(500,.1,'sine',.08)}
function dropTargetSound(){playSound(700,.1,'square',.08)}
function comboSound(n){playSound(400+n*100,.15,'triangle',.1)}

// Layout — table is taller than viewport, camera scrolls to follow ball
let W,H,TW,TH,TX,TY,SCALE;
const CTRL_HEIGHT=90;
const TABLE_W=400,TABLE_H=1400; // internal table dimensions (tall!)
const VIEW_H=750; // viewport shows this much of the table at once
// Camera
let camY=0,camTargetY=0;
const CAM_LERP_SLOW=0.02,CAM_LERP_FAST=0.08;
let camLerp=CAM_LERP_SLOW;

function resize(){
  W=window.innerWidth;H=window.innerHeight;C.width=W;C.height=H;
  const ar=TABLE_W/VIEW_H;
  const availH=H-CTRL_HEIGHT-24;
  TH=availH;TW=Math.min(W-8,TH*ar);
  if(TW>W-8){TW=W-8;TH=TW/ar}
  TX=(W-TW)/2;TY=20;SCALE=TW/TABLE_W;initTable();
}

// Physics — based on real pinball and top canvas pinball games
// Gravity 0.12 = simulates ~6.5° table incline (ball rolls toward drain naturally)
// Friction 0.9985 = polished wood surface, ball rolls smoothly but slows over time
// Bounce 0.5 = rubber bumper rails absorb some energy but still lively
// Bumper bounce 1.3 = pop bumpers give satisfying kick without chaos
const GRAVITY=0.12,FRICTION=0.9985,BOUNCE=0.5,BUMPER_BOUNCE=1.3;
const FLIPPER_POWER=11,FLIPPER_HOLD_POWER=1.5; // active flip vs resting on flipper
const MAX_BALL_SPEED=15; // speed cap prevents physics breaking

// Character sprites
const charImgs={};let charImgsLoaded=0;

  let mb1=createBall(200,600,true);mb1.inLane=false;mb1.vx=2.5;mb1.vy=-4;balls.push(mb1);
  let mb2=createBall(200,600,true);mb2.inLane=false;mb2.vx=-2.5;mb2.vy=-5;balls.push(mb2);
}
function launch(){
  if(!balls.length||balls[0].active)return;
  balls[0].active=true;launching=false;
  // Power-based launch: hold longer = more power (max 20)
  // Taller table (1400 units), ball at y=1320 needs to reach y=60
  // Distance = 1260 units. With gravity 0.12: v = sqrt(2*0.12*1260) = 17.4
  // Full power (20) → vy=-19 (reaches top comfortably)
  // Light tap (2) → vy=-5 (dribbles partway)
  const pwr=Math.max(plungerPower,2);
  const launchVy=-(pwr*0.8+3.4); // ranges from -5 (tap) to -19.4 (full hold)
  balls[0].vy=launchVy;balls[0].vx=0;
  balls[0].inLane=true;
  ballSaveTimer=300;
  camLerp=CAM_LERP_FAST; // camera starts tracking ball
  // Skill shot: need precise medium power (60-80% range)
  if(skillShotActive&&plungerPower>=12&&plungerPower<=16){
    addScore(2500);skillShotSound();
    spawnScorePopup(371,400,'SKILL SHOT!\n2500','#FFD700');
    showStatus('\u{1F3AF} SKILL SHOT! +2500');
  }
  skillShotActive=false;launchSound();
  // Reset power meter visual
  const pm=document.getElementById('powerMeter');if(pm)pm.style.height='0%';
}

function addScore(pts){
  const mult=multiplier*totalBonusMultiplier;
  const total=Math.floor(pts*mult);
  score+=total;scoreEl.textContent=score.toLocaleString();
  // Extra ball thresholds
  [50000,150000,300000,500000].forEach(threshold=>{
    if(score>=threshold&&!extraBallAwarded[threshold]){
      extraBallAwarded[threshold]=true;
      ballsLeft++;updateBallsDisplay();extraBallSound();
      showStatus('\u{1F389} EXTRA BALL!');
    }
  });
}

function showStatus(text){
  statusBar.textContent=text;statusBar.classList.add('show');
  setTimeout(()=>statusBar.classList.remove('show'),2500);
}

function updateCombo(){
  combo++;comboTimer=120;
  if(combo>=3){multiplier=Math.min(5,1+Math.floor(combo/3)*0.5);comboSound(Math.min(combo,10))}
  comboEl.textContent='COMBO x'+combo;comboEl.classList.add('active');
  multEl.textContent=multiplier>1?'x'+multiplier.toFixed(1):'';
}
function decayCombo(){
  if(comboTimer>0){comboTimer--;return}
  if(combo>0){combo=0;multiplier=1;comboEl.classList.remove('active');multEl.textContent=''}
}

function checkBucketList(){
  if(bucketHits.buckee&&bucketHits.listy&&bucketHits.citty){
    addScore(5000);bonusSound();
    bucketHits={buckee:false,listy:false,citty:false};
    document.querySelectorAll('.bl-item').forEach(e=>e.classList.remove('hit'));
    for(let i=0;i<40;i++)spawnParticle(200,300,'#FFD700');
    addMultiball();
    totalBonusMultiplier+=0.5;level++;
    showStatus('\u{2B50} BUCKET LIST COMPLETE! Level '+level);
  }
}

function spawnParticle(x,y,color){
  particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:1,color,r:Math.random()*3+1});
}
function spawnScorePopup(x,y,text,color='#fff'){
  scorePopups.push({x,y,text,color,life:1,vy:-1.5});
}
function addFlasher(b){flashers.push({x:b.x,y:b.y,r:b.r,life:1,color:b.glow})}

// Collision
function circleCircle(ax,ay,ar,bx,by,br){
  const dx=ax-bx,dy=ay-by,dist=Math.sqrt(dx*dx+dy*dy);
  return dist<ar+br?{nx:dx/dist,ny:dy/dist,overlap:ar+br-dist}:null;
}

function flipperCollision(f,bx,by,br,side){
  const angle=side==='left'?
    f.restAngle+(f.activeAngle-f.restAngle)*leftAngle:
    f.restAngle+(f.activeAngle-f.restAngle)*rightAngle;
  const ex=f.x+Math.cos(angle)*f.len,ey=f.y+Math.sin(angle)*f.len;
  const dx=ex-f.x,dy=ey-f.y,len2=dx*dx+dy*dy;
  let t=((bx-f.x)*dx+(by-f.y)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  const cx=f.x+t*dx,cy=f.y+t*dy;
  const ddx=bx-cx,ddy=by-cy,dist=Math.sqrt(ddx*ddx+ddy*ddy);
  if(dist<br+5){
    return{nx:ddx/dist,ny:ddy/dist,overlap:br+5-dist,
      flipping:side==='left'?leftFlip:rightFlip,angle};
  }
  return null;
}

function nudge(dx){
  if(tilted||tiltCooldown>0)return;
  tiltWarnings++;shakeX=dx*3;
  if(tiltWarnings>=3){tilted=true;showStatus('\u{26A0}\uFE0F TILT!');return}
  balls.forEach(b=>{if(b.active){b.vx+=dx*2;b.vy-=0.5}});
  tiltCooldown=30;
}

function updateBall(ball){
  if(!ball.active)return true;
  if(tilted)return ball.y<750;
  
  // Trail
  ball.trail.push({x:ball.x,y:ball.y,life:1});
  if(ball.trail.length>12)ball.trail.shift();
  ball.trail.forEach(t=>t.life-=0.08);
  
  ball.vy+=GRAVITY;ball.vx*=FRICTION;ball.vy*=FRICTION;
  // Speed cap — prevents ball from going haywire after rapid bumper hits
  const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
  if(spd>MAX_BALL_SPEED){const scale=MAX_BALL_SPEED/spd;ball.vx*=scale;ball.vy*=scale}
  ball.x+=ball.vx;ball.y+=ball.vy;

  // Walls & Shooter Lane
  const wallL=30,wallR=345,plungerL=352,plungerR=390;
  const RAIL_TOP=60; // where the curved rail bends the ball left
  const LANE_CX=(plungerL+plungerR)/2; // lane center x
  
  // Left wall — rubber rail bounce
  if(ball.x-ball.r<wallL){ball.x=wallL+ball.r;ball.vx=Math.abs(ball.vx)*BOUNCE}
  
  // Shooter lane physics (right side channel)
  if(ball.inLane){
    // Keep ball centered in lane — strong containment walls
    if(ball.x-ball.r<plungerL){ball.x=plungerL+ball.r;ball.vx=Math.abs(ball.vx)*BOUNCE*0.3}
    if(ball.x+ball.r>plungerR){ball.x=plungerR-ball.r;ball.vx=-Math.abs(ball.vx)*BOUNCE*0.3}
    // Gently guide ball toward center of lane
    ball.vx+=(LANE_CX-ball.x)*0.02;
    // Curved rail at top — when ball reaches top of lane, redirect onto playfield
    if(ball.y<RAIL_TOP+ball.r){
      ball.inLane=false; // exit shooter lane, enter playfield
      ball.y=RAIL_TOP+ball.r+5;
      ball.x=wallR-ball.r-5; // place ball just inside playfield right wall
      // Curve the ball left and slightly down — simulating the rail arc
      const speed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
      ball.vx=-Math.max(speed*0.6,4); // leftward push proportional to launch power
      ball.vy=Math.max(Math.abs(ball.vy)*0.15,0.8); // gentle downward
    }
    // If ball falls back to drain in the lane, let it drain normally
    if(ball.y>1360){ball.inLane=false;return false}
  } else {
    // Normal playfield walls — right wall blocks re-entry to lane
    if(ball.x+ball.r>wallR){ball.x=wallR-ball.r;ball.vx=-Math.abs(ball.vx)*BOUNCE}
    // Top wall for playfield
    if(ball.y-ball.r<40){ball.y=40+ball.r;ball.vy=Math.abs(ball.vy)*BOUNCE}
  }

  // Bumpers (with cooldown to prevent infinite bounce trap)
  for(const b of bumpers){
    if(b.cd>0){b.cd--;continue}
    const col=circleCircle(ball.x,ball.y,ball.r,b.x,b.y,b.r);
    if(col){
      ball.x+=col.nx*(col.overlap+2);ball.y+=col.ny*(col.overlap+2);
      const speed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
      // Proper reflection: reflect velocity along collision normal + add bumper kick
      // dot product of velocity with normal
      const dot=ball.vx*col.nx+ball.vy*col.ny;
      // Reflect: v - 2*(v·n)*n, then add bumper impulse
      ball.vx=ball.vx-2*dot*col.nx;ball.vy=ball.vy-2*dot*col.ny;
      // Apply bumper boost (pop bumper impulse)
      const boost=Math.max(speed*0.3,1.5)*BUMPER_BOUNCE;
      ball.vx+=col.nx*boost;ball.vy+=col.ny*boost;
      b.cd=8; // 8-frame cooldown prevents rapid re-hits
      addScore(b.pts);bumpSound();addFlasher(b);updateCombo();
      if(particles.length<200){for(let i=0;i<8;i++)spawnParticle(b.x,b.y,b.glow)}
      if(scorePopups.length<20)spawnScorePopup(b.x,b.y-b.r-10,'+'+b.pts,b.glow);
      if(b.name){
        bucketHits[b.name]=true;
        const el=document.getElementById('bl-'+b.name);
        if(el)el.classList.add('hit');
        checkBucketList();
      }
    }
  }

  // Flippers — proper reflection + angular momentum when active
  const lc=flipperCollision(flippers.left,ball.x,ball.y,ball.r,'left');
  if(lc){ball.x+=lc.nx*(lc.overlap+1);ball.y+=lc.ny*(lc.overlap+1);
    if(lc.flipping){
      // Active flip: strong upward launch with direction based on contact normal
      ball.vx=lc.nx*FLIPPER_POWER*0.6+2;ball.vy=-FLIPPER_POWER*0.85;flipSound();
    }else{
      // Ball rolling on resting flipper — gentle redirect
      const dot=ball.vx*lc.nx+ball.vy*lc.ny;
      ball.vx-=2*dot*lc.nx*0.5;ball.vy=-Math.abs(ball.vy)*FLIPPER_HOLD_POWER*0.3;
    }}
  const rc=flipperCollision(flippers.right,ball.x,ball.y,ball.r,'right');
  if(rc){ball.x+=rc.nx*(rc.overlap+1);ball.y+=rc.ny*(rc.overlap+1);
    if(rc.flipping){
      ball.vx=rc.nx*FLIPPER_POWER*0.6-2;ball.vy=-FLIPPER_POWER*0.85;flipSound();
    }else{
      const dot=ball.vx*rc.nx+ball.vy*rc.ny;
      ball.vx-=2*dot*rc.nx*0.5;ball.vy=-Math.abs(ball.vy)*FLIPPER_HOLD_POWER*0.3;
    }}

  // Slingshots — rubber-band kickers above flippers
  if(ball.x>50&&ball.x<120&&ball.y>1190&&ball.y<1260){
    const wx=ball.x-50,wy=ball.y-1190;
    if(wx<wy*0.5&&ball.vx<2){ball.vx+=3.5;ball.vy-=2;addScore(10);for(let i=0;i<4;i++)spawnParticle(ball.x,ball.y,'#FF6B35')}
  }
  if(ball.x>260&&ball.x<330&&ball.y>1190&&ball.y<1260){
    const wx=330-ball.x,wy=ball.y-1190;
    if(wx<wy*0.5&&ball.vx>-2){ball.vx-=3.5;ball.vy-=2;addScore(10);for(let i=0;i<4;i++)spawnParticle(ball.x,ball.y,'#FF6B35')}
  }

  // Drop targets (3 bank at y=950)
  for(let i=0;i<3;i++){
    if(!dropTargets[i])continue;
    const dtx=160+i*40,dty=950;
    if(Math.abs(ball.x-dtx)<15&&Math.abs(ball.y-dty)<10&&ball.vy>0){
      dropTargets[i]=false;ball.vy=-Math.abs(ball.vy)*0.8;
      addScore(200);dropTargetSound();updateCombo();
      spawnScorePopup(dtx,dty-15,'+200','#ff44ff');
      for(let j=0;j<5;j++)spawnParticle(dtx,dty,'#ff44ff');
      if(!dropTargets[0]&&!dropTargets[1]&&!dropTargets[2]){
        addScore(2000);showStatus('\u{1F4A5} DROP TARGETS COMPLETE! +2000');
        dropResetTimer=180;
      }
    }
  }

  // Spinner (at x=200, y=250)
  if(Math.abs(ball.x-200)<12&&Math.abs(ball.y-250)<15&&Math.abs(ball.vy)>2){
    spinnerSpeed=Math.abs(ball.vy)*2;
    addScore(25);spinnerSound();
  }

  // Kickbacks (outlane saves)
  if(ball.y>1290&&ball.y<1330){
    if(ball.x<45&&kickbackLeft){
      kickbackLeft=false;ball.vx=4;ball.vy=-7;kickbackSound();
      showStatus('\u{1F6E1}\uFE0F LEFT KICKBACK!');addScore(50);
    }
    if(ball.x>335&&ball.x<345&&kickbackRight){
      kickbackRight=false;ball.vx=-4;ball.vy=-7;kickbackSound();
      showStatus('\u{1F6E1}\uFE0F RIGHT KICKBACK!');addScore(50);
    }
  }

  // Top lanes
  if(ball.y<110&&ball.y>60){
    if(ball.x>80&&ball.x<120){addScore(200);spawnScorePopup(100,80,'+200','#44ddff');for(let i=0;i<3;i++)spawnParticle(100,80,'#44ddff')}
    if(ball.x>170&&ball.x<210){addScore(200);spawnScorePopup(190,80,'+200','#44ddff');for(let i=0;i<3;i++)spawnParticle(190,80,'#44ddff')}
    if(ball.x>260&&ball.x<300){addScore(200);spawnScorePopup(280,80,'+200','#44ddff');for(let i=0;i<3;i++)spawnParticle(280,80,'#44ddff')}
  }

  // Drain
  if(ball.y>1370){
    if(ballSaveTimer>0&&balls.length<=1){
      ball.x=200;ball.y=1100;ball.vx=0;ball.vy=-6;
      showStatus('\u{1F4AB} BALL SAVED!');ballSaveTimer=0;return true;
    }
    return false;
  }
  return true;
}

function update(){
  if(!playing)return;
  
  // Flipper animation
  leftAngle+=(leftFlip?1:0-leftAngle)*0.3;
  rightAngle+=(rightFlip?1:0-rightAngle)*0.3;
  
  // Shake decay
  shakeX*=0.8;shakeY*=0.8;
  if(tiltCooldown>0)tiltCooldown--;

  if(launching&&!balls[0]?.active){
    if(plungerHeld&&plungerPower<20)plungerPower+=0.25;
    // Update power meter visual
    const pm=document.getElementById('powerMeter');
    if(pm)pm.style.height=(plungerPower/20*100)+'%';
    return;
  }

  if(ballSaveTimer>0)ballSaveTimer--;
  
  // Drop target reset
  if(dropResetTimer>0){dropResetTimer--;if(dropResetTimer===0)dropTargets=[true,true,true]}
  
  // Spinner decay
  if(spinnerSpeed>0){spinnerAngle+=spinnerSpeed*0.1;spinnerSpeed*=0.95;if(spinnerSpeed<0.5)spinnerSpeed=0}
  
  decayCombo();

  // Camera follows active ball with smooth lerp (Space Pinball style)
  const activeBall=balls.find(b=>b.active);
  if(activeBall){
    camTargetY=activeBall.y-VIEW_H*0.4; // ball sits 40% from top of view
    camLerp=CAM_LERP_FAST;
  }else{
    camTargetY=TABLE_H-VIEW_H; // show bottom (flippers) when no active ball
    camLerp=CAM_LERP_SLOW;
  }
  camTargetY=Math.max(0,Math.min(camTargetY,TABLE_H-VIEW_H));
  camY+=(camTargetY-camY)*camLerp;

  // Update all balls
  for(let i=balls.length-1;i>=0;i--){
    if(!updateBall(balls[i])){
      balls.splice(i,1);
      if(balls.length===0){
        ballsLeft--;drainSound();updateBallsDisplay();
        tilted=false;tiltWarnings=0;
        // End of ball bonus
        const bonus=combo*100+level*500;
        if(bonus>0){addScore(bonus);showStatus('BONUS: +'+bonus)}
        if(ballsLeft>0)setTimeout(resetBall,1000);
        else setTimeout(gameOver,1500);
      }
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=0.025;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=flashers.length-1;i>=0;i--){flashers[i].life-=0.05;if(flashers[i].life<=0)flashers.splice(i,1)}
  for(let i=scorePopups.length-1;i>=0;i--){
    const p=scorePopups[i];p.y+=p.vy;p.life-=0.02;
    if(p.life<=0)scorePopups.splice(i,1);
  }
}

function updateBallsDisplay(){
  ballsEl.textContent='\u26AA'.repeat(Math.max(0,ballsLeft))+'\u26AB'.repeat(Math.max(0,3-ballsLeft));
}

function draw(){
  ctx.clearRect(0,0,W,H);ctx.save();
  // Clip to table viewport area
  ctx.beginPath();ctx.rect(TX-2,TY-2,TW+4,TH+4);ctx.clip();
  // Camera transform — scroll the table based on ball position
  ctx.translate(TX+shakeX,TY+shakeY);ctx.scale(SCALE,SCALE);
  ctx.translate(0,-camY); // ← THE CAMERA SCROLL

  // Table bg with gradient (full tall table)
  const tbg=ctx.createLinearGradient(15,30,15,TABLE_H);
  tbg.addColorStop(0,'#0D1B2A');tbg.addColorStop(0.3,'#1A1A2E');tbg.addColorStop(0.6,'#16213E');tbg.addColorStop(1,'#0D1B2A');
  ctx.fillStyle=tbg;ctx.fillRect(15,30,330,TABLE_H-30);
  // Shooter lane background
  ctx.fillStyle='#0a1220';ctx.fillRect(352,40,38,TABLE_H-40);

  // Neon border — playfield (full height)
  ctx.shadowColor='#FF6B35';ctx.shadowBlur=8;
  ctx.strokeStyle='#FF6B35';ctx.lineWidth=3;
  ctx.strokeRect(15,30,330,TABLE_H-30);
  // Shooter lane border
  ctx.strokeRect(352,40,38,TABLE_H-40);
  // Curved rail connecting shooter lane top to playfield
  ctx.beginPath();
  ctx.moveTo(352,40);
  ctx.quadraticCurveTo(350,32,335,30);
  ctx.stroke();
  // Divider wall between playfield and lane
  ctx.strokeStyle='#FF6B35';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(345,80);ctx.lineTo(345,TABLE_H);ctx.stroke();
  // Rail curve indicator
  ctx.strokeStyle='#44ddff66';ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(352,60);
  ctx.quadraticCurveTo(348,42,330,35);
  ctx.stroke();
  // Lane label
  ctx.fillStyle='#FF6B3566';ctx.font='bold 8px sans-serif';ctx.textAlign='center';
  ctx.fillText('SHOOT',371,100);
  ctx.shadowBlur=0;

  // Top Lanes
  ctx.globalAlpha=0.2;ctx.fillStyle='#44ddff';
  ctx.fillRect(80,50,40,60);ctx.fillRect(170,50,40,60);ctx.fillRect(260,50,40,60);
  ctx.globalAlpha=1;
  ctx.fillStyle='#44ddff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
  ctx.fillText('200',100,85);ctx.fillText('200',190,85);ctx.fillText('200',280,85);

  // Decorative ramp lines (upper section)
  ctx.strokeStyle='#FF6B3533';ctx.lineWidth=1;
  for(let y=130;y<400;y+=50){
    ctx.beginPath();ctx.moveTo(40,y);ctx.lineTo(60,y-20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(340,y);ctx.lineTo(320,y-20);ctx.stroke();
  }

  // Slingshots — above flippers
  ctx.strokeStyle='#FF6B35';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(50,1190);ctx.lineTo(90,1260);ctx.stroke();
  ctx.beginPath();ctx.moveTo(330,1190);ctx.lineTo(290,1260);ctx.stroke();

  // V-shaped drain guides
  ctx.fillStyle='#0D1B2A';
  ctx.beginPath();ctx.moveTo(15,1230);ctx.lineTo(80,1295);ctx.lineTo(15,1295);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#FF6B3588';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(15,1230);ctx.lineTo(80,1295);ctx.stroke();
  ctx.beginPath();ctx.moveTo(345,1230);ctx.lineTo(300,1295);ctx.lineTo(345,1295);ctx.closePath();
  ctx.fillStyle='#0D1B2A';ctx.fill();
  ctx.strokeStyle='#FF6B3588';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(345,1230);ctx.lineTo(300,1295);ctx.stroke();

  // Outlane/inlane separators
  ctx.strokeStyle='#FF6B3544';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(45,1250);ctx.lineTo(45,1310);ctx.stroke();
  ctx.beginPath();ctx.moveTo(335,1250);ctx.lineTo(335,1310);ctx.stroke();

  // Kickback indicators
  if(kickbackLeft){ctx.fillStyle='#44ff44';ctx.globalAlpha=0.4;ctx.fillRect(16,1290,12,30);ctx.globalAlpha=1}
  if(kickbackRight){ctx.fillStyle='#44ff44';ctx.globalAlpha=0.4;ctx.fillRect(333,1290,12,30);ctx.globalAlpha=1}

  // Drop targets
  for(let i=0;i<3;i++){
    const dtx=160+i*40,dty=950;
    if(dropTargets[i]){
      ctx.fillStyle='#ff44ff';ctx.shadowColor='#ff44ff';ctx.shadowBlur=6;
      ctx.fillRect(dtx-12,dty-4,24,8);ctx.shadowBlur=0;
    }else{
      ctx.fillStyle='#333';ctx.fillRect(dtx-12,dty-4,24,8);
    }
  }

  // Spinner
  ctx.save();ctx.translate(200,250);ctx.rotate(spinnerAngle);
  ctx.strokeStyle=spinnerSpeed>1?'#FFD700':'#888';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(10,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(0,10);ctx.stroke();
  ctx.restore();

  // Flashers
  for(const f of flashers){
    ctx.globalAlpha=f.life*0.5;
    const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*3);
    g.addColorStop(0,f.color);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(f.x,f.y,f.r*3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // Bumpers
  for(const b of bumpers){
    const g=ctx.createRadialGradient(b.x,b.y,b.r*0.5,b.x,b.y,b.r*1.5);
    g.addColorStop(0,b.glow+'88');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,b.r*1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    if(b.name&&charImgs[b.name]){
      const s=b.r*2.8;ctx.save();
      ctx.beginPath();ctx.arc(b.x,b.y,b.r+2,0,Math.PI*2);ctx.clip();
      ctx.drawImage(charImgs[b.name],b.x-s/2,b.y-s/2,s,s);ctx.restore();
      ctx.fillStyle='#fff';ctx.font='bold 8px sans-serif';ctx.textAlign='center';
      ctx.fillText(b.name.charAt(0).toUpperCase()+b.name.slice(1),b.x,b.y+b.r+12);
    }else if(b.pts>=100){
      ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
      ctx.fillText(b.pts,b.x,b.y+b.r+12);
    }
  }

  // Flippers
  const drawFlipper=(f,side)=>{
    const angle=side==='left'?
      f.restAngle+(f.activeAngle-f.restAngle)*leftAngle:
      f.restAngle+(f.activeAngle-f.restAngle)*rightAngle;
    const ex=f.x+Math.cos(angle)*f.len,ey=f.y+Math.sin(angle)*f.len;
    ctx.strokeStyle='#FF6B3555';ctx.lineWidth=16;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(ex,ey);ctx.stroke();
    ctx.strokeStyle='#FF6B35';ctx.lineWidth=10;
    ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(ex,ey);ctx.stroke();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(f.x,f.y,5,0,Math.PI*2);ctx.fill();
  };
  drawFlipper(flippers.left,'left');drawFlipper(flippers.right,'right');

  // Ball save indicator
  if(ballSaveTimer>0){
    ctx.globalAlpha=0.3+Math.sin(Date.now()*0.01)*0.2;
    ctx.fillStyle='#44ff44';ctx.fillRect(120,1340,160,5);
    ctx.globalAlpha=1;
  }

  // Balls
  for(const ball of balls){
    if(ball.active){
      // Trail
      for(let i=0;i<ball.trail.length;i++){
        const t=ball.trail[i];if(t.life<=0)continue;
        ctx.globalAlpha=t.life*0.3;ctx.fillStyle='#FF6B35';
        ctx.beginPath();ctx.arc(t.x,t.y,ball.r*t.life,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
      // Glow
      const bg=ctx.createRadialGradient(ball.x,ball.y,0,ball.x,ball.y,ball.r*2.5);
      bg.addColorStop(0,'#ffffff44');bg.addColorStop(1,'transparent');
      ctx.fillStyle=bg;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r*2.5,0,Math.PI*2);ctx.fill();
      // Ball
      ctx.fillStyle='#ddd';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x-2,ball.y-2,ball.r*0.4,0,Math.PI*2);ctx.fill();
    }else{
      const py=1320-plungerPower*3;
      ctx.fillStyle='#ddd';ctx.beginPath();ctx.arc(371,py,ball.r,0,Math.PI*2);ctx.fill();
      // Plunger rod
      ctx.fillStyle='#FF6B35';ctx.fillRect(364,py+ball.r,14,1360-py-ball.r);
      // Plunger base
      ctx.fillStyle='#cc5522';ctx.fillRect(358,1352,26,8);
      // Skill shot zone indicator
      if(skillShotActive){
        const greenY=1320-16*3,greenH=1320-12*3-greenY;
        ctx.fillStyle='#44ff4444';ctx.fillRect(353,greenY,3,greenH);
        ctx.fillStyle='#44ff44';ctx.font='bold 7px sans-serif';ctx.textAlign='center';
        ctx.fillText('SKILL',371,greenY-4);
      }
      // Launch arrows — animated
      ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
      const arrowY=py-14-Math.sin(Date.now()*0.005)*4;
      ctx.fillText('\u25B2',371,arrowY);
      ctx.globalAlpha=0.4;ctx.fillText('\u25B2',371,arrowY-12);ctx.globalAlpha=1;
    }
  }

  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Score popups
  for(const p of scorePopups){
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    const lines=p.text.split('\n');
    lines.forEach((line,i)=>ctx.fillText(line,p.x,p.y+i*13));
  }
  ctx.globalAlpha=1;

  // Tilt warning — draw relative to camera so it's always visible
  if(tilted){
    ctx.globalAlpha=0.3+Math.sin(Date.now()*0.02)*0.2;
    ctx.fillStyle='#ff0000';ctx.font='bold 40px sans-serif';ctx.textAlign='center';
    ctx.fillText('TILT',195,camY+VIEW_H/2);ctx.globalAlpha=1;
  }

  // Branding at bottom of table
  ctx.fillStyle='#FF6B3544';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
  ctx.fillText('citybucketlist.com',195,TABLE_H-20);

  // Level indicator
  if(level>1){
    ctx.fillStyle='#FFD70066';ctx.font='bold 10px sans-serif';
    ctx.fillText('LEVEL '+level,195,TABLE_H-8);
  }

  // Section labels (decorative, scrolls with table)
  ctx.fillStyle='#FF6B3522';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
  ctx.fillText('★ ADVENTURE ZONE ★',190,140);
  ctx.fillText('★ BUCKET LIST ★',190,440);
  ctx.fillText('★ BONUS ALLEY ★',190,920);

  ctx.restore();
}

function gameOver(){
  playing=false;balls=[];
  if(score>hiScore){hiScore=score;localStorage.setItem('cbl_pinball_hi',hiScore)}
  const isNew=score>=hiScore&&score>0;
  overlay.innerHTML=`<h1>GAME OVER</h1><div class="final">${score.toLocaleString()}</div><h2>points</h2>`+
    (isNew?'<div class="hi">\u{1F3C6} NEW HIGH SCORE!</div>':'')+
    `<div class="hi">Best: ${hiScore.toLocaleString()}</div>`+
    `<div class="sub">Level ${level} | Multiplier x${totalBonusMultiplier.toFixed(1)}</div>`+
    `<button id="startBtn">PLAY AGAIN</button><div class="sub">citybucketlist.com</div>`;
  overlay.style.display='flex';
  document.getElementById('startBtn').onclick=startGame;
}

function startGame(){
  AC.resume();score=0;ballsLeft=3;playing=true;level=1;
  totalBonusMultiplier=1;combo=0;multiplier=1;tilted=false;tiltWarnings=0;
  kickbackLeft=true;kickbackRight=true;
  dropTargets=[true,true,true];extraBallAwarded={};
  bucketHits={buckee:false,listy:false,citty:false};
  document.querySelectorAll('.bl-item').forEach(e=>e.classList.remove('hit'));
  scoreEl.textContent='0';updateBallsDisplay();
  comboEl.classList.remove('active');multEl.textContent='';
  overlay.style.display='none';resetBall();
}

function loop(){update();draw();requestAnimationFrame(loop)}

// Input
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='z'||e.key==='Z')leftFlip=true;
  if(e.key==='ArrowRight'||e.key==='m'||e.key==='M')rightFlip=true;
  if((e.key===' '||e.key==='ArrowDown')&&launching){plungerHeld=true;if(plungerPower===0)plungerPower=0}
  if(e.key==='t'||e.key==='T')nudge(1);
  if(e.key==='q'||e.key==='Q')nudge(-1);
  e.preventDefault();
});
let plungerHeld=false;
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='z'||e.key==='Z')leftFlip=false;
  if(e.key==='ArrowRight'||e.key==='m'||e.key==='M')rightFlip=false;
  if((e.key===' '||e.key==='ArrowDown')&&plungerHeld){plungerHeld=false;launch()}
});

// Touch
const btnL=document.getElementById('btnLeft'),btnR=document.getElementById('btnRight'),btnP=document.getElementById('btnPlunger');
btnL.addEventListener('touchstart',e=>{e.preventDefault();leftFlip=true});
btnL.addEventListener('touchend',e=>{e.preventDefault();leftFlip=false});
btnR.addEventListener('touchstart',e=>{e.preventDefault();rightFlip=true});
btnR.addEventListener('touchend',e=>{e.preventDefault();rightFlip=false});
btnP.addEventListener('touchstart',e=>{e.preventDefault();plungerHeld=true;plungerPower=0});
btnP.addEventListener('touchend',e=>{e.preventDefault();plungerHeld=false;launch()});
btnL.addEventListener('mousedown',()=>leftFlip=true);btnL.addEventListener('mouseup',()=>leftFlip=false);
btnR.addEventListener('mousedown',()=>rightFlip=true);btnR.addEventListener('mouseup',()=>rightFlip=false);
btnP.addEventListener('mousedown',()=>{plungerHeld=true;plungerPower=0});btnP.addEventListener('mouseup',()=>{plungerHeld=false;launch()});

// Device shake for tilt
let lastAccel={x:0,y:0};
window.addEventListener('devicemotion',e=>{
  if(!e.accelerationIncludingGravity)return;
  const a=e.accelerationIncludingGravity;
  const dx=Math.abs(a.x-lastAccel.x);
  if(dx>15)nudge(a.x>lastAccel.x?1:-1);
  lastAccel={x:a.x||0,y:a.y||0};
});

startBtn.onclick=startGame;
window.addEventListener('resize',resize);
resize();loop();
</script>
